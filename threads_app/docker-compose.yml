services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threads
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d threads"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrations:
    image: liquibase/liquibase:4.28
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/liquibase/changelog
    command:
      - --url=jdbc:postgresql://db:5432/threads
      - --username=postgres
      - --password=postgres
      - --changelog-file=changelog/changelog.xml
      - update
    restart: "no"

  app:
    build: .
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      APP_NAME: Threads Demo App
      DB_DRIVER: sqlalchemy
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/threads
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/threads
    ports:
      - "8000:8000"

volumes:
  postgres_data:
