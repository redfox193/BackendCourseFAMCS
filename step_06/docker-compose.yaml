version: "3.9"

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  random-service-volume:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: random-service-volume
    env_file:
      - ./service/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_started

volumes:
  postgres-data: